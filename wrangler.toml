name = "trenuj-se"
compatibility_date = "2026-04-01"
main = "server/worker.ts"

routes = [{ pattern = "www.trenuj.se", zone_name = "trenuj.se", custom_domain = true }, { pattern = "trenuj.se", zone_name = "trenuj.se", custom_domain = true }]

[assets]
directory = "dist"
