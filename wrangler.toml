run_worker_first = ["/api/*", "/mcp", "/mcp/*", "/.well-known/*"]

[vars]
# Override locally via `.dev.vars`.
PUBLIC_APP_URL = "https://www.trenuj.se"
VITE_SUPABASE_URL = "https://bjyrrqtzzywauescjmhr.supabase.co"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
